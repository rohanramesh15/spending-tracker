AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Spending Tracker backend (Phase 1). API Lambda behind a Function URL, an SQS-driven
  worker Lambda, a job queue + DLQ, and an EventBridge schedule — all wired from day
  one even though the worker is idle in Phase 1 (plan §4, §9). All on AWS always-free
  allowances; never add a NAT Gateway or Elastic IP.

Parameters:
  SsmParamPrefix:
    Type: String
    Default: /spending-tracker
    Description: >
      Path prefix for SecureString parameters (SUPABASE_DB_URL, SUPABASE_JWT_SECRET,
      later Gemini/Plaid/Kroger keys). The functions read these at init and never store
      secrets as plaintext env vars (CLAUDE.md #11).
  CorsAllowOrigins:
    Type: String
    Default: http://localhost:5173
    Description: >
      Comma-separated frontend origins allowed by the API's CORS — NOT a JSON array.
      No quotes/brackets: SAM shlex-parses parameter_overrides and would strip a JSON
      array's quotes, leaving a bare "[" that 502s the app at init. The app parses this
      plain string (config._parse_origins).
  AlertEmail:
    Type: String
    Default: rohanramesh15@gmail.com
    Description: >
      Where prod alerts go (Lambda errors, dead-letter queue not empty). After the first
      deploy AWS emails a one-time "Confirm subscription" link — you MUST click it or the
      alarms can't reach you. $0: CloudWatch alarms + SNS email are within always-free.

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        SSM_PARAM_PREFIX: !Ref SsmParamPrefix

Resources:
  # --- Background jobs: queue + dead-letter queue (poison messages) ---
  JobsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: spending-tracker-jobs-dlq
      MessageRetentionPeriod: 1209600 # 14 days

  JobsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: spending-tracker-jobs
      VisibilityTimeout: 180 # >= worker Timeout; chunked one-message-per-store jobs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt JobsDLQ.Arn
        maxReceiveCount: 5

  # --- API Lambda (FastAPI via Mangum) behind a Function URL (no API Gateway) ---
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: spending-tracker-api
      CodeUri: ../backend
      Handler: app.main.handler
      Description: FastAPI app; source-agnostic ingest, charts, reconciliation.
      Environment:
        Variables:
          SSM_PARAM_PREFIX: !Ref SsmParamPrefix
          CORS_ALLOW_ORIGINS: !Ref CorsAllowOrigins
          JOBS_QUEUE_URL: !Ref JobsQueue
      FunctionUrlConfig:
        AuthType: NONE # public URL; the app verifies the Supabase JWT itself
        # No Cors block on purpose. The FastAPI app's CORSMiddleware (app/main.py) is the
        # SINGLE CORS authority, driven by the real origin allow-list (CorsAllowOrigins →
        # config.cors_allow_origins). A Function-URL Cors block here would *also* emit an
        # Access-Control-Allow-Origin header — two identical ACAO headers, which browsers
        # reject — and AllowOrigins:["*"] would echo any origin, defeating the allow-list.
        # OPTIONS preflight is forwarded to the app, which answers it.
      Policies:
        - Statement:
            - Sid: ReadSecureParams
              Effect: Allow
              Action: [ssm:GetParametersByPath, ssm:GetParameter, ssm:GetParameters]
              # GetParametersByPath is authorized against the path node itself, not just
              # the children — grant both, or a recursive fetch is AccessDenied.
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParamPrefix}
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParamPrefix}/*
            - Sid: DecryptSecureParams
              Effect: Allow
              Action: [kms:Decrypt]
              Resource: "*"
        - SQSSendMessagePolicy:
            QueueName: !GetAtt JobsQueue.QueueName

  # --- Worker Lambda (drains the job queue; idle in Phase 1) ---
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: spending-tracker-worker
      CodeUri: ../backend
      Handler: app.worker.handler
      Description: SQS-driven jobs — price refresh, Plaid re-sync, recurring recompute.
      Timeout: 120
      Events:
        JobQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt JobsQueue.Arn
            BatchSize: 1
            FunctionResponseTypes: [ReportBatchItemFailures]
      Policies:
        - Statement:
            - Sid: ReadSecureParams
              Effect: Allow
              Action: [ssm:GetParametersByPath, ssm:GetParameter, ssm:GetParameters]
              # GetParametersByPath is authorized against the path node itself, not just
              # the children — grant both, or a recursive fetch is AccessDenied.
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParamPrefix}
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParamPrefix}/*
            - Sid: DecryptSecureParams
              Effect: Allow
              Action: [kms:Decrypt]
              Resource: "*"

  # --- EventBridge Scheduler: daily price refresh (DISABLED until Phase 5) ---
  SchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: scheduler.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeWorker
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt WorkerFunction.Arn

  PriceRefreshSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: spending-tracker-price-refresh
      State: DISABLED # present from day one; enabled in Phase 5 (plan §9)
      ScheduleExpression: cron(0 9 * * ? *) # 09:00 UTC daily
      FlexibleTimeWindow: { Mode: "OFF" }
      Target:
        Arn: !GetAtt WorkerFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn

  # --- EventBridge Scheduler: Plaid fallback re-sync (webhooks are the fast path; this is
  #     the safety net for missed/delayed transaction webhooks — industry standard) ---
  PlaidSyncSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: spending-tracker-plaid-sync
      State: ENABLED
      ScheduleExpression: rate(6 hours)
      FlexibleTimeWindow: { Mode: "OFF" }
      Target:
        Arn: !GetAtt WorkerFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn
        Input: '{"job":"plaid_sync"}'

  # --- Observability: email me when prod breaks (Lambda errors, stuck jobs) ---
  # CloudWatch alarms → SNS → email. The one thing the pipeline was missing: knowing when
  # something fails in prod. All within always-free (10 alarms + SNS email free).
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: spending-tracker-alerts

  AlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  ApiErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: spending-tracker-api-errors
      AlarmDescription: The API Lambda returned one or more errors in the last 5 minutes.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching # no invocations ≠ a problem
      AlarmActions: [!Ref AlertsTopic]
      OKActions: [!Ref AlertsTopic] # also tell me when it recovers

  WorkerErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: spending-tracker-worker-errors
      AlarmDescription: The worker Lambda (Plaid sync / background jobs) errored in the last 5 minutes.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref WorkerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]
      OKActions: [!Ref AlertsTopic]

  DlqNotEmptyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: spending-tracker-dlq-not-empty
      AlarmDescription: A background job failed maxReceiveCount times and landed in the dead-letter queue.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt JobsDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

Outputs:
  ApiFunctionUrl:
    Description: Public Function URL of the API Lambda (set as the frontend's VITE_API_BASE_URL).
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  JobsQueueUrl:
    Description: SQS job queue URL.
    Value: !Ref JobsQueue
  JobsDLQUrl:
    Description: Dead-letter queue URL.
    Value: !Ref JobsDLQ
  AlertsTopicArn:
    Description: SNS topic that fans out prod alarms to email.
    Value: !Ref AlertsTopic
