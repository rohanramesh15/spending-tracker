name: CodeQL

# SAST — static security analysis (what companies run alongside tests). Free on public
# repos. Results appear under the repo's Security → Code scanning alerts tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly Monday sweep (catches new rules on unchanged code)

permissions:
  contents: read
  security-events: write # upload findings to the code-scanning dashboard

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none # both languages are interpreted — no compile step needed
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
